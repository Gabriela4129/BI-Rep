<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BI SmartBilling Agent</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #e9e9e9;
      color: #23384d;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* Top Header */
    .top-header {
      background: #efefef;
      padding: 20px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 26px;
      font-weight: bold;
      color: #425d75;
      line-height: 1.1;
      letter-spacing: 1px;
    }

    .logo span {
      color: #f28c00;
    }

    .lang-switch {
      font-size: 14px;
      color: #1e456b;
      font-weight: bold;
    }

    /* Navigation bar */
    .nav-bar {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 220px 280px;
      align-items: stretch;
      background: #203a56;
      min-height: 54px;
      overflow: hidden;
    }

    .nav-item {
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: bold;
      border-right: 1px solid rgba(255,255,255,0.18);
      background: linear-gradient(180deg, #324b66 0%, #203a56 100%);
      padding: 0 12px;
      text-align: center;
    }

    .nav-item.search {
      gap: 8px;
    }

    .cta-orange {
      background: linear-gradient(180deg, #ffab00 0%, #f08d00 100%);
      color: white;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
    }

    .cta-green {
      background: linear-gradient(180deg, #43c61d 0%, #2fa60f 100%);
      color: white;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      text-align: center;
      padding: 0 10px;
    }

    /* Hero / patterned section */
    .hero {
      position: relative;
      min-height: 620px;
      background:
        radial-gradient(circle at 20px 20px, rgba(180,180,180,0.18) 0 18px, transparent 18px),
        radial-gradient(circle at 80px 80px, rgba(180,180,180,0.12) 0 18px, transparent 18px),
        linear-gradient(0deg, rgba(255,255,255,0.35), rgba(255,255,255,0.35)),
        #e7e7e7;
      background-size: 120px 120px, 120px 120px, auto, auto;
      overflow: hidden;
      padding: 40px 24px 120px;
    }

    .hero-inner {
      max-width: 1300px;
      margin: 0 auto;
      position: relative;
      height: 100%;
    }

    /* Big circle image */
    .circle-wrap {
      position: absolute;
      left: 80px;
      top: 70px;
      width: 420px;
      height: 420px;
    }

    .circle-accent {
      position: absolute;
      left: -45px;
      top: 140px;
      width: 120px;
      height: 120px;
      background: #f39a00;
      border-radius: 50%;
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
      z-index: 1;
    }

    .circle-image {
      position: absolute;
      width: 390px;
      height: 390px;
      border-radius: 50%;
      overflow: hidden;
      background: #7aa8d0;
      box-shadow: 0 10px 30px rgba(0,0,0,0.22);
      border: 4px solid rgba(255,255,255,0.7);
      z-index: 2;
    }

    .circle-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Orange strip */
    .announcement {
      position: absolute;
      left: 420px;
      top: 320px;
      right: 40px;
      background: #f39a00;
      color: white;
      font-size: 18px;
      font-weight: bold;
      padding: 18px 24px;
      box-shadow: 0 8px 18px rgba(0,0,0,0.12);
    }

    /* Widget card */
    .widget-card {
      position: absolute;
      left: 720px;
      top: 140px;
      width: 420px;
      background: rgba(255,255,255,0.95);
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.14);
      padding: 24px;
      z-index: 3;
    }

    .widget-card h1 {
      margin: 0 0 10px;
      font-size: 28px;
      color: #203a56;
    }

    .widget-card p {
      margin: 0 0 18px;
      font-size: 15px;
      line-height: 1.5;
      color: #5c6d7e;
    }

    .demo-badge {
      display: inline-block;
      background: #f39a00;
      color: white;
      font-size: 12px;
      font-weight: bold;
      padding: 7px 12px;
      border-radius: 999px;
      margin-bottom: 14px;
    }

    .widget-shell {
      padding: 16px;
      border: 1px solid #dbe3ea;
      border-radius: 14px;
      background: #f8fbfd;
    }

    /* Floating icons */
    .floating-icons {
      position: fixed;
      right: 18px;
      top: 280px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      z-index: 20;
    }

    .floating-icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: white;
      border: 3px solid #284b72;
      color: #284b72;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.18);
    }

    /* Footer */
    .footer {
      background: #203a56;
      color: white;
      text-align: center;
      padding: 18px;
      font-size: 14px;
    }

    /* Tablet */
    @media (max-width: 1100px) {
      .nav-bar {
        grid-template-columns: 1fr 1fr 1fr;
      }

      .cta-orange,
      .cta-green {
        display: none;
      }

      .hero {
        min-height: auto;
        padding-bottom: 60px;
      }

      .circle-wrap,
      .announcement,
      .widget-card {
        position: relative;
        left: auto;
        top: auto;
